# Locksmith Configuration Example

# This is an example configuration file for locksmith. Save this as ~/.locksmith/config.yml to customize behavior.

auth:
  # Enforce biometric authentication
  # When true, commands requiring keychain access will prompt for Touch ID / Windows Hello
  # Default: true
  require_biometrics: true

  # Custom prompt message shown by the OS during biometric request.
  # Use '%s' to inject the name of the secret being accessed.
  # Default: "Authentication required to access '%s'"
  prompt_message: "Authenticate to access Locksmith secret '%s'"

notifications:
  # Threshold for expiration warnings
  # Secrets expiring within this duration will trigger warnings
  # Formats: "7d" (days), "2w" (weeks), "1mo" (months), "1y" (years), "24h" (hours)
  # Default: 10d
  expiring_threshold: 10d

  # Notification method
  # Options:
  #   - stderr: Print warnings to stderr (default, non-intrusive)
  #   - macos:  Show macOS notification popup
  #   - silent: No notifications (useful for automation)
  # Default: stderr
  method: stderr

  # Show expiration warnings when using 'locksmith get'
  # Default: true
  show_on_get: true

  # Show expiration status when using 'locksmith list'
  # Default: true
  show_on_list: true

access_control:
  # Binary whitelisting – restrict which executables may access secrets via the library
  allow_binaries:
    - "/usr/local/bin/allowed_app"
  deny_binaries:
    - "/usr/bin/forbidden_app"
rotation:
  - secret: "github/*"
    rotator: "github-app-installation-token"
    secret_type: "token"
    owner_application: "github"
    # Endpoint format: /app/installations/<installation_id>/access_tokens
    source_url: "https://api.github.com/app/installations/<installation_id>/access_tokens"
    # Prefer storing app credentials in Locksmith and referencing them here.
    metadata:
      github_app_client_id: "locksmith://github/app/clientid"
      # Optional: explicit installation id. If omitted, Locksmith will query /app/installations.
      github_installation_id: "locksmith://github/app/installation-id"
      # Optional selector when app has multiple installations.
      # github_installation_account: "bonjoski"
      github_app_private_key: "locksmith://github/app/private-key"
    # Env vars are still supported as fallback:
    #   GITHUB_APP_CLIENT_ID (preferred), GITHUB_APP_ID (fallback),
    #   GITHUB_APP_INSTALLATION_ID, GITHUB_APP_PRIVATE_KEY
    ttl: "24h"
  - secret: "github/pat/*"
    rotator: "github-fgpat-replace"
    secret_type: "api_key"
    owner_application: "github"
    # Transitional broker endpoint for PAT replacement if needed.
    source_url: "https://rotation.example.internal/github/fgpat/replace"
    ttl: "24h"
  - secret: "github/oauth/*"
    rotator: "github-oauth-reset"
    secret_type: "oauth_token"
    owner_application: "github"
    source_url: "https://api.github.com/applications/<github_client_id>/token"
    # client_secret is read from GITHUB_CLIENT_SECRET (or secret metadata key github_client_secret)
    ttl: "24h"
  - secret: "atlassian/*"
    rotator: "url-json"
    secret_type: "api_key"
    owner_application: "atlassian"
    source_url: "https://rotation.example.internal/atlassian"
    ttl: "24h"
  - secret: "gitlab/*"
    rotator: "gitlab-pat-self-rotate"
    secret_type: "api_key"
    owner_application: "gitlab"
    source_url: "https://gitlab.example.com"
    # Desired validity for newly rotated PATs. Rotator maps this to GitLab expires_at.
    ttl: "24h"
    # Optional fixed date override (YYYY-MM-DD). Usually not needed when ttl is set.
    # metadata:
    #   gitlab_expires_at: "2026-07-17"
