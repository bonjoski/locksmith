name: CodeQL Security Analysis

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sundays at midnight UTC
  workflow_dispatch:

# Set strict permissions at the top level
permissions: read-all

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: macos-latest  # Required for CGO + macOS frameworks
    
    permissions:
      security-events: write  # Required to upload SARIF results
      contents: read          # Required to checkout code
      actions: read           # Required to read workflow metadata
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Unshallow Git history
        run: git fetch --unshallow || true

      - name: Set up Go
        uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version: '1.25.4'
          cache: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@a65a038433a26f4363cf9f029e3b9ceac831ad5d # v3.28.10
        with:
          languages: c-cpp, go  # Analyze both C/C++ (CGO) and Go code

      - name: Clean previous builds
        run: make clean

      - name: Build with CodeQL tracing
        run: make build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@a65a038433a26f4363cf9f029e3b9ceac831ad5d # v3.28.10
