name: CodeQL Security Analysis

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sundays at midnight UTC
  workflow_dispatch:

# Set strict permissions at the top level
permissions: read-all

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: macos-latest  # Required for CGO + macOS frameworks
    
    permissions:
      security-events: write  # Required to upload SARIF results
      contents: read          # Required to checkout code
      actions: read           # Required to read workflow metadata
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Unshallow Git history
        run: git fetch --unshallow || true

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25.4'
          cache: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: c-cpp, go  # Analyze both C/C++ (CGO) and Go code

      - name: Clean previous builds
        run: make clean

      - name: Build with CodeQL tracing
        run: make build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
