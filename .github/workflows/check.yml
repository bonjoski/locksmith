name: check
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions: read-all


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-check:
    name: Code Quality & Security
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25.4'
          cache: true

      - name: Run TruffleHog
        run: |
          make trufflehog

      - name: Run golangci-lint
        run: |
          make lint

      - name: Run unit tests
        run: |
          go test -v -tags locksmith_admin ./...

      - name: Verify Context Freshness
        run: |
          chmod +x scripts/update-context.sh
          ./scripts/update-context.sh --structural-only
          if [[ -n $(git status --porcelain .memory/) ]]; then
            echo "ERROR: .memory/ documentation is out of sync with recent changes."
            echo "Please run ./scripts/update-context.sh locally and commit the changes."
            git diff .memory/
            exit 1
          fi