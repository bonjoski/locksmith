name: check
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-check:
    name: Code Quality & Security
    runs-on: ubuntu-latest  # Linux is faster and more reliable for these tools
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0 # Required for Gitleaks to scan history

      - name: Setup Go
        uses: actions/setup-go@3041bf56d941b39bc61799a62951f28085761283 # v5.2.0
        with:
          go-version: '1.25.4'
          cache: true

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@646f2549d47936da51079f8754160a0a54e95d66 # v2.3.8

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@971e25160daa5df9466eb2e8f1df003716886616 # v6.1.1
        with:
          version: v1.61

      - name: Run unit tests
        run: |
          go test -v ./...