name: release

on:
  push:
    tags:
      - 'v*' # Triggers on version tags (e.g., v1.0.0)
  workflow_dispatch: # Allows manual trigger from Actions tab for testing

# 1. Explicitly set top-level permissions to "read-all" as a safety baseline
permissions: read-all

jobs:
  build-and-release:
    name: Build, Attest, and Release
    runs-on: macos-latest
    
    # 2. Grant specific write permissions only to this job
    permissions:
      contents: write      # Required to create the GitHub Release and upload assets
      id-token: write     # Required for signing the Artifact Attestation (OIDC)
      attestations: write # Required to publish the build provenance to GitHub

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25.4'
          cache: true

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v6.2.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Import macOS Certificate
        uses: apple-actions/import-codesign-certs@fe74d46e82474f87e1ba79832ad28a4013d0e33a # v6.1.0
        with:
          p12-file-base64: ${{ secrets.MACOS_CERTIFICATE }}
          p12-password: ${{ secrets.MACOS_CERTIFICATE_PWD }}

      - name: Build and Sign Locksmith
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # 1. Store credentials for notarization
          xcrun notarytool store-credentials "notarytool-profile" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_PASSWORD"

          # 2. List all available signing identities for diagnosis
          echo "=== Available codesigning identities ==="
          security find-identity -v -p codesigning
          echo "========================================"

          # 3. Export SIGN_ID as an env var (preserves quoting with spaces/parens)
          export SIGN_ID=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -n 1 | sed -E 's/.*"(.*)".*/\1/')
          echo "Using signing identity: [$SIGN_ID]"
          if [ -z "$SIGN_ID" ]; then
            echo "ERROR: No Developer ID Application certificate found in keychain!"
            exit 1
          fi

          # 4. Build and sign
          make release

      - name: Verify signing before notarization
        run: |
          echo "=== Strict codesign verify ==="
          codesign --verify --strict --verbose=4 bin/Locksmith-darwin-arm64.app
          codesign --verify --strict --verbose=4 bin/Locksmith-darwin-amd64.app
          echo "=== Gatekeeper assessment ==="
          spctl --assess --type execute --verbose bin/Locksmith-darwin-arm64.app || true
          spctl --assess --type execute --verbose bin/Locksmith-darwin-amd64.app || true
          echo "=== Dynamic library dependencies ==="
          otool -L bin/locksmith-darwin-arm64
          otool -L bin/locksmith-darwin-amd64

      - name: Notarize and Staple Locksmith
        run: make notarize && make staple

      - name: Generate Artifact Attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: 'bin/*'

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          format: spdx-json
          output-file: bin/locksmith.spdx.json
          path: .

      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            bin/*
          generate_release_notes: true

  update-homebrew:
    name: Update Homebrew Formula
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout locksmith
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.4.0

      - name: Update Formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAP_REPO: "bonjoski/homebrew-locksmith"
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Updating Homebrew to version ${VERSION}"
          
          # Clone the tap repo
          gh repo clone ${TAP_REPO} tap_repo
          
          # Download the new binaries to get their SHAs
          gh release download v${VERSION} -p 'locksmith-darwin-arm64' -p 'locksmith-darwin-amd64' -D tmp_bin --repo bonjoski/locksmith
          
          ARM64_SHA=$(shasum -a 256 tmp_bin/locksmith-darwin-arm64 | awk '{print $1}')
          AMD64_SHA=$(shasum -a 256 tmp_bin/locksmith-darwin-amd64 | awk '{print $1}')
          
          FORMULA="tap_repo/Formula/locksmith.rb"
          
          # Update version and SHAs in the formula
          # Using perl for multi-line or more complex regex if needed, but sed should work for simple replacements
          sed -i "s/version \".*\"/version \"${VERSION}\"/" ${FORMULA}
          
          # Update ARM64 block
          # We search for the pattern and replace the next line (very specific to the current formula structure)
          sed -i "/locksmith-darwin-arm64/ { N; s/sha256 \".*\"/sha256 \"${ARM64_SHA}\"/; }" ${FORMULA}
          sed -i "s/download\/v.*\/locksmith-darwin-arm64/download\/v${VERSION}\/locksmith-darwin-arm64/" ${FORMULA}
          
          # Update AMD64 block
          sed -i "/locksmith-darwin-amd64/ { N; s/sha256 \".*\"/sha256 \"${AMD64_SHA}\"/; }" ${FORMULA}
          sed -i "s/download\/v.*\/locksmith-darwin-amd64/download\/v${VERSION}\/locksmith-darwin-amd64/" ${FORMULA}
          
          # Commit and push
          cd tap_repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/locksmith.rb
          git commit -m "feat: update to v${VERSION}"
          git push origin main