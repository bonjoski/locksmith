name: release

on:
  push:
    tags:
      - 'v*' # Triggers on version tags (e.g., v1.0.0)
  workflow_dispatch: # Allows manual trigger from Actions tab for testing

# 1. Explicitly set top-level permissions to "read-all" as a safety baseline
permissions: read-all

jobs:
  build-and-release:
    name: Build, Attest, and Release
    runs-on: macos-latest
    
    # 2. Grant specific write permissions only to this job
    permissions:
      contents: write      # Required to create the GitHub Release and upload assets
      id-token: write     # Required for signing the Artifact Attestation (OIDC)
      attestations: write # Required to publish the build provenance to GitHub

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Enforce signed release tags
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG_NAME="${GITHUB_REF_NAME}"

          # Signed tags must be annotated tag objects, not lightweight commit refs.
          OBJ_TYPE="$(git cat-file -t "$TAG_NAME")"
          if [[ "$OBJ_TYPE" != "tag" ]]; then
            echo "::error::Tag ${TAG_NAME} is lightweight. Create a signed annotated tag with: git tag -s ${TAG_NAME} -m 'Release ${TAG_NAME}'"
            exit 1
          fi

          TAG_OBJECT_SHA="$(git rev-parse "${TAG_NAME}^{tag}")"
          VERIFIED="$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${TAG_OBJECT_SHA}" --jq '.verification.verified')"
          REASON="$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${TAG_OBJECT_SHA}" --jq '.verification.reason')"

          if [[ "$VERIFIED" != "true" ]]; then
            echo "::error::Tag ${TAG_NAME} signature is not verified by GitHub (reason: ${REASON})."
            exit 1
          fi

          echo "Verified signed tag ${TAG_NAME}."

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.25.4'
          cache: true

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v6.2.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Import macOS Certificate
        uses: apple-actions/import-codesign-certs@5142e029c445c10ffc7149d172e540235a065466 # v7.0.0
        with:
          p12-file-base64: ${{ secrets.MACOS_CERTIFICATE }}
          p12-password: ${{ secrets.MACOS_CERTIFICATE_PWD }}

      - name: Build and Sign Locksmith
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # 1. Store credentials for notarization
          xcrun notarytool store-credentials "notarytool-profile" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_PASSWORD"

          # 2. List all available signing identities for diagnosis
          echo "=== Available codesigning identities ==="
          security find-identity -v -p codesigning
          echo "========================================"
          
          # 3. Export SIGN_ID as an env var (preserves quoting with spaces/parens)
          export SIGN_ID=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -n 1 | sed -E 's/.*"(.*)".*/\1/')
          echo "Using signing identity: [$SIGN_ID]"
          if [ -z "$SIGN_ID" ]; then
            echo "ERROR: No Developer ID Application certificate found in keychain!"
            exit 1
          fi
          
          # 4. Build all providers
          make build-summon
          # 5. Build and sign
          make release
          
      - name: Verify signing before notarization
        run: |
          echo "=== Strict codesign verify ==="
          codesign --verify --strict --verbose=4 bin/Locksmith-darwin-arm64.app
          codesign --verify --strict --verbose=4 bin/Locksmith-darwin-amd64.app
          codesign --verify --strict --verbose=4 bin/Summon-darwin-arm64.app # Added check
          codesign --verify --strict --verbose=4 bin/Summon-darwin-amd64.app # Added check
          echo "=== Gatekeeper assessment ==="
          spctl --assess --type execute --verbose bin/Locksmith-darwin-arm64.app || true
          spctl --assess --type execute --verbose bin/Locksmith-darwin-amd64.app || true
          spctl --assess --type execute --verbose bin/Summon-darwin-arm64.app || true # Added check
          spctl --assess --type execute --verbose bin/Summon-darwin-amd64.app || true # Added check
          echo "=== Dynamic library dependencies ==="
          otool -L bin/locksmith-darwin-arm64
          otool -L bin/locksmith-darwin-amd64
          otool -L bin/summon-locksmith-darwin-arm64
          otool -L bin/summon-locksmith-darwin-amd64
          
      - name: Notarize and Staple Release Apps
        run: make notarize && make staple
      - name: Generate Artifact Attestation
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            bin/locksmith-*
            bin/summon-locksmith-*
            bin/Locksmith-*.zip
            bin/Summon-*.zip
            bin/*.app
            bin/summon*.app # Added summon apps
          
      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          format: spdx-json
          output-file: bin/locksmith.spdx.json
          path: .
          
      - name: Create Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: |
            bin/*
          generate_release_notes: true

      - name: Update Homebrew Formula
        run: |
          chmod +x scripts/dev/update-homebrew-formula.sh
          ./scripts/dev/update-homebrew-formula.sh "${GITHUB_REF_NAME}"

      - name: Commit and Push Homebrew Formula Update
        if: ${{ success() }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet contrib/homebrew/locksmith.rb; then
            echo "No changes to Homebrew formula"
          else
            git add contrib/homebrew/locksmith.rb
            git commit -m "chore: auto-update homebrew formula to ${GITHUB_REF_NAME}"
            UPDATE_COMMIT="$(git rev-parse HEAD)"

            if git push origin HEAD:main; then
              echo "Pushed formula update directly to main"
            else
              echo "Direct push failed (main moved). Rebasing formula update onto latest main and retrying..."
              git fetch origin main
              git checkout -B release-homebrew-update origin/main

              if git cherry-pick "$UPDATE_COMMIT"; then
                git push origin HEAD:main
                echo "Pushed formula update after rebasing onto latest main"
              else
                echo "Cherry-pick conflict while applying formula update; skipping push without failing release"
                git cherry-pick --abort || true
              fi
            fi
          fi

  sync-homebrew-tap:
    name: Sync Homebrew Tap Repo
    needs: build-and-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Fetch formula from locksmith main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/bonjoski/locksmith/contents/contrib/homebrew/locksmith.rb?ref=main --jq '.content' | base64 --decode > locksmith.rb

      - name: Checkout tap repository
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN is not set; skipping tap sync"
            exit 0
          fi
          gh repo clone bonjoski/homebrew-locksmith tap_repo

      - name: Sync formula and push
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN is not set; skipping tap sync"
            exit 0
          fi
          cp locksmith.rb tap_repo/Formula/locksmith.rb
          cd tap_repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet Formula/locksmith.rb; then
            echo "Tap formula already up to date"
            exit 0
          fi
          git add Formula/locksmith.rb
          git commit -m "chore: sync locksmith formula ${GITHUB_REF_NAME}"
          git push https://x-access-token:${GH_TOKEN}@github.com/bonjoski/homebrew-locksmith.git main